{% if site.repository and site.staticman.branch %}
  <script>
    (function () {
      const form = document.getElementById('new_comment');
      if (!form) return;

      const submit = document.getElementById('comment-form-submit');
      const notice = form.querySelector('.js-notice');
      const noticeText = form.querySelector('.js-notice-text');

      function showAlert(message, type) {
        notice.classList.remove('hidden', 'notice--success', 'notice--danger');
        notice.classList.add(`notice--${type}`);
        noticeText.textContent = message;
      }

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        form.classList.add('disabled');
        submit.innerHTML = '<i class="fa fa-spinner fa-spin fa-fw"></i> {{ site.data.ui-text[site.locale].loading_label | default: "Loading..." }}';

        try {
          const response = await fetch(form.action, {
            method: form.method,
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams(new FormData(form))
          });
          if (!response.ok) throw new Error(`Staticman returned ${response.status}`);

          submit.textContent = '{{ site.data.ui-text[site.locale].comment_btn_submitted | default: "Submitted" }}';
          showAlert('{{ site.data.ui-text[site.locale].comment_success_msg | default: "Thanks for your comment! It will show on the site once it has been approved." }}', 'success');
        } catch (error) {
          console.error(error);
          submit.textContent = '{{ site.data.ui-text[site.locale].comment_btn_submit | default: "Submit Comment" }}';
          showAlert('{{ site.data.ui-text[site.locale].comment_error_msg | default: "Sorry, there was an error with your submission. Please make sure all required fields have been completed and try again." }}', 'danger');
          form.classList.remove('disabled');
        }
      });
    }());
  </script>
{% endif %}
